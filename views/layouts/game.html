	<script>
	for(var i = 0; i < IMGS.length; i++){
		var preImg = $('<link rel="prefetch" href="'+IMGS[i]+'" as="image">');
		$('head').append(preImg);
	}
	
	var Socket = io.connect();
	Socket.on("connect",() => {

	});
	
var RoC = {
 host: '{{globalVar "host"}}',
 port: {{globalVar "port"}},
 init: (callback) => {
  $(document).on($.modal.AFTER_CLOSE, function(event, modal){
   $(modal.$elm[0]).remove();
  });
  
  RoC.controllers.User.init();
	RoC.controllers.Tpl.init();
	RoC.controllers.Player.init();
	RoC.controllers.City.init();
	
	callback();
 },
 Game:{
  tileTypesObject: {
   'moor': 0,
   'plain': 1,
   'grassland': 2,
   'lake': 3,
   'hill': 4,
   'mountain': 5,
   'barbarian': 6,
   'city': 7
  },
  tileTypesArray: ['moor', 'plain', 'grassland', 'lake', 'hill', 'mountain', 'barbarian', 'city'],
  buildingTypesObject: {
   towncenter: 0,
   house: 1,
   lumber: 2,
   mill: 2,
   mine: 3,
   barracks: 4,
   range: 5,
   stable: 6,
   siege: 7,
   tower: 8,
   blacksmith: 9,
   market: 10,
   monastery: 11,
   university: 12,
   wall: 13,
   castle: 14
  },
  buildingTypesArray: ["towncenter","house","lumber","mill","mine","barracks","range","stable","siege","tower","blacksmith","market","monastery","university","wall","castle"],
 },
 models: {
  Player: {
	      id: {{Player.id}},
	      uid: {{Player.uid}},
	      name: "{{Player.name}}",
	      gender: "{{Player.gender}}",
	      avatar: "{{Player.avatar}}",
	      power: {{Player.power}},
	      realm: {{Player.realm}},
	      chat: {{Player.chat}},
	      food: {{Player.food}},
	      wood: {{Player.wood}},
	      stone: {{Player.stone}},
	      ore: {{Player.ore}},
	      gold: {{Player.gold}},
	      platinum: {{Player.platinum}},
	    },
	    User: {
	      id: {{User.id}},
	      email: "{{User.email}}",
	      token: "{{User.token}}",
	    },
	    City: {
			id: {{City.id}},
			name: "{{City.name}}",
			owner: {{City.owner}},
			age: {{City.age}},
			x: {{City.x}},
			y: {{City.y}},
			realm: {{City.realm}},
			buildings: [
			 {{#each Buildings}}
			 {
			   id: {{this.id}},
			   type: {{this.type}},
			   level: {{this.level}},
			   position: {{this.position}},
			   owner: {{this.owner}},
			   city: {{this.city}},
			   realm: {{this.realm}}
			 }{{#unless @last}},{{/unless}}
			 {{/each}}
			]
	    },
	  },
	  controllers: {
	    Player: {
	      init: () => {
	        Socket.on("player-get-success", (data) => {
	          RoC.models.Player.id = data.id;
	          RoC.models.Player.pid = data.pid;
	          RoC.models.Player.name = data.name;
	          RoC.models.Player.gender = data.gender;
	          RoC.models.Player.avatar = data.avatar;
	          RoC.models.Player.chat = data.chat;
	          RoC.models.Player.power = data.power;
	          RoC.models.Player.realm = data.realm;
	          RoC.models.Player.food = data.food;
	          RoC.models.Player.wood = data.wood;
	          RoC.models.Player.stone = data.stone;
	          RoC.models.Player.ore = data.ore;
	          RoC.models.Player.gold = data.gold;
	          RoC.models.Player.platinum = data.platinum;
	        });
	        
	        Socket.on('player-update-incoming', (data) => {
	          RoC.models.Player.id = data.id;
	          RoC.models.Player.pid = data.pid;
	          RoC.models.Player.name = data.name;
	          RoC.models.Player.gender = data.gender;
	          RoC.models.Player.avatar = data.avatar;
	          RoC.models.Player.chat = data.chat;
	          RoC.models.Player.power = data.power;
	          RoC.models.Player.realm = data.realm;
	          RoC.models.Player.food = data.food;
	          RoC.models.Player.wood = data.wood;
	          RoC.models.Player.stone = data.stone;
	          RoC.models.Player.ore = data.ore;
	          RoC.models.Player.gold = data.gold;
	          RoC.models.Player.platinum = data.platinum;
	        });
	      }
	    },
	    User: {
	      init: () => {
	        Socket.on("login-success", (data) => {
	          RoC.models.User.id = data.user.id;
	          RoC.models.User.email = data.user.email;
	          
	          RoC.models.Player.name = data.player.name;
	          RoC.models.Player.gender = data.player.gender;
	          RoC.models.Player.avatar = data.player.avatar;
	          RoC.models.Player.chat = data.player.chat;
	          RoC.models.Player.power = data.player.power;
	          RoC.models.Player.realm = data.player.realm;
	          RoC.models.Player.food = data.player.food;
	          RoC.models.Player.wood = data.player.wood;
	          RoC.models.Player.stone = data.player.stone;
	          RoC.models.Player.ore = data.player.ore;
	          RoC.models.Player.gold = data.player.gold;
	          RoC.models.Player.platinum = data.player.platinum;
	          RoC.models.User.token = data.token;
	        
	          setCookie('uid', RoC.models.User.getId(), 365);
	        
	          window.location = "http://"+RoC.host+"/game";
	      });
	      
	        Socket.on("login-failed", (data) => {
	          window.location = "http://"+RoC.host+data.redirect;
	        });
	      
	        Socket.on("register-success", (data) => {
	          window.location = "http://"+RoC.host+data.redirect;
	        });
	      
	        Socket.on("logout-success", (data) => {
	          window.location = "http://"+RoC.host;
	        });
	      
	        Socket.on("user-update-incoming", (data) => {
	          RoC.models.User.id = data.user.id;
	          RoC.models.User.email = data.user.email;
	          RoC.models.User.token = data.token;
	        });
	      
	        Socket.on("user-get-success", (data) => {
	          RoC.models.User.id = data.user.id;
	          RoC.models.User.email = data.user.email;
	          RoC.models.User.token = data.token;
	        });
	      }
	    },
	    City: {
			init: () => {
				Socket.on("city-get-results", (data) => {
					RoC.models.City.id = data.id;
					RoC.models.City.name = data.name;
					RoC.models.City.owner = data.owner;
					RoC.models.City.age = data.age;
					RoC.models.City.x = data.x;
					RoC.models.City.y = data.y;
					RoC.models.City.realm = data.realm;
					
					Socket.emit('city-get-buildings', RoC.models.City.id);
				});
				
				Socket.on("city-get-buildings-results", (data) => {
					RoC.models.City.buildings = data;
					RoC.controllers.Tpl.buildCity();
				});
			}
	    },
	    Tpl: {
	      init: () => {
	        Socket.on("tpl-gender-result", (data) => {
	          var html = RoC.controllers.Tpl.build(data);
	          $('.avatars').html(html);
	        });
	      },
	      build: (data) => {
	        var template = Handlebars.compile(data.html);
	        return template(data.data);
	      },
	      buildCity: () => {
	        for(var i = 0; i < RoC.models.City.buildings.length; i++){
	          var b = RoC.models.City.buildings[i], $el;
	          if(b.type == 0){
	           // towncenter
	           $el = $('a#plot-towncenter');
	           el.addClass('towncenter-'+RoC.models.City.age);
	          }else if(b.type == 13){
	           // wall
	           
	          }else if(b.type == 14){
	           // castle
	           $el = $('a#plot-castle');
	           
	          }else{
	           $el = $('a#plot'+b.position);
	           var c = RoC.Game.buildingTypeArray[b.type]+'-'+RoC.models.City.age;
	           $el.addClass(c);
	          }
	        }
	      },
	      buildFields: () => {
	      
	      },
	      buildRealm: () => {
	        
	      }
	    }
	  },
	  events: {
	   City: {
	    init: function(){
	     $(document).on('click', '.towncenter', function(e){
	      e.preventDefault();
	      
	     });
	    }
	   }
	  }
	};
		document.addEventListener( 'DOMContentLoaded', () => {
	RoC.init(function(){
	  RoC.controllers.Tpl.buildCity();
	});
}, false);

	Handlebars.registerHelper('iff', (a, operator, b, opts) => {
		var bool = false;
		switch(operator) {
			case '==':
				bool = a == b;
			break;
			case '>':
				bool = a > b;
			break;
			case '<':
				bool = a < b;
			break;
			default:
				throw "Unknown operator " + operator;
		}
		
		if (bool) {
			return opts.fn(this);
		} else {
			return opts.inverse(this);
		}
	});
	</script>
	</head>
	<body>
		<div id="loading"></div>
		<div class="mt-auto h-100">
			{{{body}}}
		</div>
		<footer class="mastfoot mt-auto">
			<p class="lead">Copyright &copy; 2020 - All Rights Reserved - <a href="#">Realms of Camelot</a></p>
			<p><a href="mailto:jason.allen.oneal@gmail.com">jason dot allen dot oneal at gmail dot com</a></p>
		</footer>
		<script>
		function onReady(callback) {
			var intervalId = window.setInterval(function() {
				if (document.getElementsByTagName('body')[0] !== undefined) {
					window.clearInterval(intervalId);
					callback.call(this);
				}
			}, 1000);
		}

		function setVisible(selector, visible) {
			document.querySelector(selector).style.display = visible ? 'block' : 'none';
		}

		onReady(function() {
			setVisible('#gameDiv', true);
			setVisible('#loading', false);
		});
		
		$(document).on('click', '.viewSelect', function(e){
		  e.preventDefault();
		  
		  var idStr = $(this).attr('id');
		  var idParts = idStr.split('-');
		  var id = idParts[1];
		  
		  Socket.emit('tpl-view-change', id);
		});
		
		function setCookie(name,value,days) {
			var expires = "";
			if (days) {
				var date = new Date();
				date.setTime(date.getTime() + (days*24*60*60*1000));
				expires = "; expires=" + date.toUTCString();
			}
			document.cookie = name + "=" + (value || "")  + expires + "; path=/";
		}
		function getCookie(name) {
			var nameEQ = name + "=";
			var ca = document.cookie.split(';');
			for(var i=0;i < ca.length;i++) {
				var c = ca[i];
				while (c.charAt(0)==' ') c = c.substring(1,c.length);
				if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
			}
			return null;
		}
		function eraseCookie(name) {   
			document.cookie = name+'=; Max-Age=-99999999;';  
		}
		</script>
	</body>
</html>
